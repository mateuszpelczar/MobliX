# backend/src/main/resources/application-prod.properties
spring.application.name=moblix
server.port=8080
spring.profiles.active=prod

# Database - konfiguracja
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.transaction.jta.platform=org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# File upload - ograniczenia i katalog poza katalogiem aplikacji
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=${FILE_UPLOAD_DIR:/var/app/uploads/images}

# Debug OFF
debug=false

# Logging - ogranicz poziomy by nie wy?wietla? wra?liwych danych
logging.level.org.hibernate=ERROR
