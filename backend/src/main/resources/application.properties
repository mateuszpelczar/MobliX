# backend/src/main/resources/application.properties
spring.application.name=moblix
server.port=8080


# Database - konfiguracja
spring.datasource.url=${DB_URL:jdbc:postgresql://pg-mateuszpelczar022-617e.h.aivencloud.com:26034/defaultdb?sslmode=require}
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.transaction.jta.platform=org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File upload ustawienia
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=uploads/images

# Debug OFF
debug=false

# Disable graceful shutdown (immediate termination on CTRL-C)
server.shutdown=immediate

# Logging - poziom limitow aby uniknac wrazliwych danych
logging.level.org.hibernate=ERROR

# Gmail SMTP Configuration (all values from .env file)
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.from=${SMTP_FROM}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Password Reset Configuration
password.reset.token.expiration=${PASSWORD_RESET_TOKEN_EXPIRATION:3600000}
password.reset.max.attempts=${PASSWORD_RESET_MAX_ATTEMPTS:3}
password.reset.lockout.duration=${PASSWORD_RESET_LOCKOUT_DURATION:900000}
app.frontend.url=${FRONTEND_URL:http://localhost:5177}

# AWS Credentials
aws.access-key-id=${AWS_ACCESS_KEY_ID}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY}

# AWS Cognito Configuration
aws.cognito.region=${AWS_COGNITO_REGION:eu-central-1}
aws.cognito.user-pool-id=${AWS_COGNITO_USER_POOL_ID}
aws.cognito.client-id=${AWS_COGNITO_CLIENT_ID}

# AWS Content Moderation Configuration (Rekognition + Comprehend)
aws.moderation.enabled=${AWS_MODERATION_ENABLED:true}
aws.moderation.region=${AWS_MODERATION_REGION:eu-central-1}
aws.rekognition.min-confidence=${AWS_REKOGNITION_MIN_CONFIDENCE:75.0}
aws.comprehend.min-confidence=${AWS_COMPREHEND_MIN_CONFIDENCE:0.7}


