# ===========================================
# MobliX Backend - Test Configuration
# Uses H2 in-memory database in PostgreSQL mode
# ===========================================

# H2 Database (PostgreSQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging)
spring.h2.console.enabled=true

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration (test values)
jwt.secret=testSecretKeyForJwtServiceTestingPurposesOnly12345678901234567890
jwt.expiration=3600000

# Disable AWS Moderation in tests
aws.moderation.enabled=false
aws.access-key-id=test-key
aws.secret-access-key=test-secret
aws.moderation.region=eu-central-1
aws.rekognition.min-confidence=75.0
aws.comprehend.min-confidence=0.7

# Mail Configuration (mock - emails won't be sent)  
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
spring.mail.from=test@moblix.com
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Password Reset Configuration
password.reset.token.expiration=3600000
password.reset.max.attempts=3
password.reset.lockout.duration=900000

# Frontend URL
app.frontend.url=http://localhost:5173

# File Upload (test directory)
file.upload-dir=./test-uploads

# Disable unnecessary features in tests
spring.main.allow-bean-definition-overriding=true
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.example.backend=INFO
